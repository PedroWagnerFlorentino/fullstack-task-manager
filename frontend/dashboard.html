<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly</title>
  <link rel="stylesheet" href="app.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- ══════════════════════════════
       SIDEBAR
  ══════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">Taskly</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="board">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <span>Board</span>
      </button>
      <button class="nav-item" data-view="list">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <circle cx="3" cy="6" r="1" fill="currentColor" />
          <circle cx="3" cy="12" r="1" fill="currentColor" />
          <circle cx="3" cy="18" r="1" fill="currentColor" />
        </svg>
        <span>Lista</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="task-count">
        <span id="count-total">0</span> tarefas
        &nbsp;·&nbsp;
        <span id="count-done">0</span> feitas
      </div>
      <button class="nav-item" onclick="logout()" style="margin-top: 0.5rem; color: var(--danger)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- ══════════════════════════════
       CONTEÚDO PRINCIPAL
  ══════════════════════════════════ -->
  <div class="main-wrap" id="main-wrap">

    <!-- Topbar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" title="Menu">
        <span></span><span></span><span></span>
      </button>
      <h1 class="view-title" id="view-title">Board</h1>
      <button class="btn-new" id="btn-new">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Nova tarefa
      </button>
    </header>

    <!-- VIEW: BOARD -->
    <section class="view" id="view-board">
      <div class="board-canvas" id="board-canvas">
        <!-- cards são inseridos aqui pelo JS -->
        <div class="board-empty" id="board-empty">
          <p>Nenhuma tarefa ainda.<br />Clique em <strong>Nova tarefa</strong> para começar.</p>
        </div>
      </div>
    </section>

    <!-- VIEW: LISTA -->
    <section class="view hidden" id="view-list">
      <div class="list-toolbar">
        <div class="input-wrap search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" placeholder="Buscar por título…" />
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Todas</button>
          <button class="filter-btn" data-filter="pending">Pendentes</button>
          <button class="filter-btn" data-filter="done">Feitas</button>
        </div>
        <div class="filter-group">
          <label class="filter-label">Prazo</label>
          <select id="date-filter">
            <option value="all">Qualquer data</option>
            <option value="today">Hoje</option>
            <option value="week">Esta semana</option>
            <option value="overdue">Atrasadas</option>
          </select>
        </div>
      </div>
      <div class="list-body" id="list-body">
        <!-- linhas inseridas pelo JS -->
      </div>
    </section>

  </div><!-- /main-wrap -->

  <!-- ══════════════════════════════
       MODAL — Nova / Editar tarefa
  ══════════════════════════════════ -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nova tarefa</h2>
        <button class="modal-close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label for="task-title">Título</label>
          <input type="text" id="task-title" placeholder="Ex: Revisar relatório" />
        </div>
        <div class="field-group">
          <label for="task-content">Conteúdo</label>
          <textarea id="task-content" rows="4" placeholder="Descreva a tarefa…"></textarea>
        </div>
        <div class="field-group">
          <label for="task-date">Data de entrega</label>
          <input type="date" id="task-date" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-primary" id="modal-save">Salvar tarefa</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
