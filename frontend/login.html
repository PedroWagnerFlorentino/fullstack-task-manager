<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="split-layout">

    <!-- ═══════════════════════════════════════
         CAMADA DE BAIXO — Formulário Cadastro
         Fica fixo na esquerda, revelado pelo slide
    ════════════════════════════════════════════ -->
    <div class="cadastro-layer">
      <div class="form-wrapper">

        <div class="form-header">
          <h2>Crie sua conta</h2>
          <p>Comece a organizar seu trabalho hoje</p>
        </div>

        <form class="login-form" action="#" method="POST" id="form-cadastro">

          <div class="field-group">
            <label for="nome">Nome de usuário</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="8" r="4"/>
                  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
              </span>
              <input type="text" id="nome" name="nome" placeholder="Seu nome de usuário" required />
            </div>
          </div>

          <div class="field-group">
            <label for="email-cadastro">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M2 7l10 7 10-7"/>
                </svg>
              </span>
              <input type="email" id="email-cadastro" name="email" placeholder="seu@email.com" autocomplete="email" required />
            </div>
          </div>

          <div class="field-group">
            <label for="senha-cadastro">Senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="senha-cadastro" name="senha" placeholder="••••••••" required />
            </div>
          </div>

          <div class="field-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="confirmar-senha" name="confirmar_senha" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="botao-cadastro">Criar conta</button>

        </form>

        <p class="register-prompt">
          Já tem conta? <a href="#" id="ir-login">Entrar</a>
        </p>

      </div>
    </div>

    <!-- ═══════════════════════════════════════
         CAMADA DE CIMA — Painel decorativo
         Desliza para a direita revelando o cadastro
    ════════════════════════════════════════════ -->
    <aside class="panel-left">
      <div class="brand">
        <span class="brand-icon">✦</span>
        <span class="brand-name">Taskly</span>
      </div>
      <div class="panel-text">
        <h1>Organize seu<br /><em>fluxo</em> de trabalho.</h1>
        <p>Tarefas, prazos e prioridades — tudo em um só lugar.</p>
      </div>
      <div class="decoration">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
    </aside>

    <!-- ═══════════════════════════════════════
         Painel direito — Formulário Login
         Sempre fixo na direita
    ════════════════════════════════════════════ -->
    <main class="panel-right">
      <div class="form-wrapper">

        <div class="form-header">
          <h2>Bem-vindo de volta</h2>
          <p>Acesse sua conta para continuar</p>
        </div>

        <form class="login-form" action="#" method="POST" id="form-login">

          <div class="field-group">
            <label for="email">E-mail</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M2 7l10 7 10-7"/>
                </svg>
              </span>
              <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
            </div>
          </div>

          <div class="field-group">
            <label for="password">
              Senha
              <a href="#" class="forgot-link">Esqueceu?</a>
            </label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="botao-login">Entrar</button>

        </form>

        <p class="register-prompt">
          Ainda não tem conta? <a href="#" id="ir-cadastro">Cadastre-se</a>
        </p>

      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
